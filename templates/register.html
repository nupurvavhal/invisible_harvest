<!DOCTYPE html>
<html>
<head>
    <title>Register - Fruit Analyzer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(145deg, #fff8d8 0%, #fcefb5 50%, #f9df7e 100%);
            display: grid;
            place-items: center;
            padding: 20px;
        }
        .auth-card {
            width: min(100%, 480px);
            border: 0;
            border-radius: 16px;
            box-shadow: 0 14px 30px rgba(89, 66, 7, 0.2);
        }
    </style>
</head>
<body>
    <div class="card auth-card p-4 p-md-5">
        <h2 class="mb-2">Create User Account</h2>
        <p class="text-muted">Use this account to upload and analyze fruit images.</p>

        {% if error %}
            <div class="alert alert-danger py-2">{{ error }}</div>
        {% endif %}

        <form method="post" action="/register">
            <div class="mb-3">
                <label for="name" class="form-label">Full Name</label>
                <input id="name" name="name" type="text" class="form-control" required>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input id="email" name="email" type="email" class="form-control" required>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label">Password</label>
                <input id="password" name="password" type="password" minlength="6" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-warning w-100">Create Account</button>
        </form>

        <a href="/login" class="btn btn-outline-secondary w-100 mt-3">Back To Login</a>
    </div>
</body>
</html>
