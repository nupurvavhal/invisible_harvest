<!DOCTYPE html>
<html>
<head>
    <title>Login - Fruit Analyzer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #f3f9de 0%, #e4f0c1 45%, #d2e8a4 100%);
            display: grid;
            place-items: center;
            padding: 20px;
        }
        .auth-card {
            width: min(100%, 460px);
            border: 0;
            border-radius: 16px;
            box-shadow: 0 16px 34px rgba(37, 61, 16, 0.18);
        }
        .brand {
            font-weight: 700;
            letter-spacing: 0.4px;
            color: #355919;
        }
        .sub {
            color: #567137;
            margin-bottom: 18px;
        }
    </style>
</head>
<body>
    <div class="card auth-card p-4 p-md-5">
        <h2 class="brand mb-2">Fruit Analyzer Login</h2>
        <p class="sub">Sign in as user or admin</p>

        {% if registered %}
            <div class="alert alert-success py-2">Account created. Please login.</div>
        {% endif %}

        {% if error %}
            <div class="alert alert-danger py-2">{{ error }}</div>
        {% endif %}

        <form method="post" action="/login">
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input id="email" name="email" type="email" class="form-control" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input id="password" name="password" type="password" class="form-control" required>
            </div>
            <div class="mb-4">
                <label for="role" class="form-label">Login As</label>
                <select id="role" name="role" class="form-select" required>
                    <option value="user" selected>User</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
            <button type="submit" class="btn btn-success w-100">Login</button>
        </form>

        <a href="/register" class="btn btn-outline-success w-100 mt-3">Create User Account</a>
    </div>
</body>
</html>
